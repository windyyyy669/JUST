<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>망상화학 미니 포함 (캐릭터 시각화 패치)</title>
<style>
:root {
  --bg-dark: #0f111a;
  --bg-panel: #161925;
  --bg-card: #202438;
  --ui-blue: #38bdf8;
  --ui-green: #4ade80;
  --ui-yellow: #f59e0b;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; user-select: none; }
body { background: var(--bg-dark); color: #f1f5f9; width: 100vw; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

header {
  height: 50px; background: var(--bg-panel); border-bottom: 3px solid #23273a;
  display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
}
.game-container { flex: 1; display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 50px); }

/* SIDEBAR */
.sidebar { background: var(--bg-panel); border-right: 3px solid #23273a; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
.panel-title { font-size: 12px; font-weight: bold; color: var(--ui-blue); letter-spacing: 1px; margin-bottom: 4px; }
.res-box { background: var(--bg-card); padding: 10px; border-radius: 6px; border: 2px solid #2d324d; font-size: 13px; }
.res-line { display: flex; justify-content: space-between; margin-bottom: 5px; }

/* BUILD BUTTONS */
.btn-grid { display: flex; flex-direction: column; gap: 8px; }
.build-btn {
  background: #202438; border: 2px solid #313754; color: #fff; padding: 10px; border-radius: 6px;
  text-align: left; cursor: pointer; transition: 0.1s;
}
.build-btn:hover { background: #2b314a; border-color: var(--ui-blue); }
.build-btn.active { background: #1e3a8a; border-color: var(--ui-green); box-shadow: 0 0 8px rgba(74,222,128,0.3); }
.btn-desc { font-size: 11px; color: #94a3b8; margin-top: 3px; line-height: 1.3; }

/* VIEWPORT */
#viewport-container { position: relative; background: #090a10; overflow: hidden; width: 100%; height: 100%; }
canvas { display: block; width: 100%; height: 100%; }

/* HUD ANALYSIS */
.analysis-hud { position: absolute; bottom: 15px; left: 15px; background: rgba(22,25,37,0.9); border: 2px solid #2d324d; padding: 10px; border-radius: 6px; font-size: 11px; display: flex; flex-direction: column; gap: 4px; pointer-events: none; }
</style>
</head>
<body>

  <header>
    <div style="display:flex; align-items:center; gap:10px;">
      <span style="font-size:15px; font-weight:900; color:#f43f5e;">🧑‍🔬 망상화학 미니 포함!</span>
      <span style="font-size:11px; background:#1e40af; padding:2px 6px; border-radius:4px; font-weight:bold;">실험실 모드</span>
    </div>
    <div style="display:flex; gap:20px; font-size:13px;">
      <div>🔬 합성된 실리콘 소자: <span id="hud-si" style="color:var(--ui-blue); font-weight:bold;">0개</span></div>
      <div>🏃 가동 연구원 수: <span style="color:#f472b6; font-weight:bold;">4명 확실히 대기 중</span></div>
    </div>
  </header>

  <div class="game-container">
    <div class="sidebar">
      <div>
        <div class="panel-title">🎒 연구소 원료 탱크</div>
        <div class="res-box">
          <div class="res-line"><span>🪨 사염화규소 ($SiCl_4$):</span><span id="r-sicl" style="font-weight:bold; color:var(--ui-blue);">100</span></div>
          <div class="res-line"><span>⛽ 캐리어 수소 ($H_2$):</span><span id="r-h2" style="font-weight:bold; color:#fda4af;">40</span></div>
          <div class="res-line"><span>🧱 아연 및 링커 소재:</span><span id="r-mat" style="font-weight:bold; color:#c084fc;">30</span></div>
        </div>
      </div>

      <div>
        <div class="panel-title">🛠️ 화학 공정 장치 배치</div>
        <div class="btn-grid" id="build-menu">
          <button class="build-btn active" data-mode="inspect">🔍 구경하기 및 지시 모드</button>
          <button class="build-btn" data-mode="build_factory">🏭 지멘스 환원 정련소 건설<div class="btn-desc">SiCl₄ + H₂ → 실리콘 소자 생산<br><span style="color:#f87171;">(초록색 CO₂, 노란색 HCl 독가스 배출!)</span></div></button>
          <button class="build-btn" data-mode="build_mof">🧽 다공성 MOF-5 가스 필터<div class="btn-desc">주변 노란색 독가스($HCl$)를 흡수하여 수소 가스($H_2$)로 환원 재생합니다.</div></button>
        </div>
      </div>
      
      <div style="margin-top:auto; font-size:11px; color:#64748b; line-height:1.4;">
        * 팁: 화면 빈 곳을 클릭하여 공장과 필터를 지어보세요! 가스가 차오르면 연구원들이 기침을 하니 MOF 필터로 공기를 정화해 주어야 합니다.
      </div>
    </div>

    <div id="viewport-container">
      <canvas id="game-canvas"></canvas>
      
      <div class="analysis-hud">
        <div style="font-weight:bold; color:#fff; margin-bottom:2px;">📡 대기 오염 분석 센서</div>
        <div>🟢 이산화탄소 ($CO_2$ 농도): <span id="h-co2" style="font-weight:bold; color:var(--ui-green);">0%</span></div>
        <div>🟡 염화수소 ($HCl$ 독성치): <span id="h-hcl" style="font-weight:bold; color:var(--ui-yellow);">0%</span></div>
      </div>
    </div>
  </div>

<script>
const TILE_SIZE = 55;
let canvas, ctx;
let worldGrid = [];
let minions = [];
let currentMode = 'inspect';

// 핵심 자원 및 환경 가스 수치
let res = { sicl: 100, h2: 40, mat: 30, silicon: 0 };
let environment = { co2: 10, hcl: 5 }; 

// 건물이 설치된 좌표를 기록하는 리스트
let buildings = [];

// ═══════════════════════════════════════════
//  👷 귀여운 캡슐 연구원 클래스
// ═══════════════════════════════════════════
class Minion {
  constructor(x, y, name, color) {
    this.x = x; this.y = y;
    this.name = name; this.color = color;
    this.vx = (Math.random() - 0.5) * 1.5;
    this.vy = (Math.random() - 0.5) * 1.5;
    this.bubbleTimer = 0;
    this.bubbleText = "";
  }
  
  update() {
    this.x += this.vx; this.y += this.vy;
    
    // 화면 크기를 벗어나지 않도록 안전 가두기 (캔버스 크기 기준 예외 처리)
    let boundX = canvas ? canvas.width : 600;
    let boundY = canvas ? canvas.height : 500;
    
    if (this.x < 30) { this.x = 30; this.vx *= -1; }
    if (this.x > boundX - 30) { this.x = boundX - 30; this.vx *= -1; }
    if (this.y < 30) { this.y = 30; this.vy *= -1; }
    if (this.y > boundY - 30) { this.y = boundY - 30; this.vy *= -1; }
    
    // 귀여운 무작위 말풍선 타이머
    if (this.bubbleTimer > 0) {
      this.bubbleTimer--;
    } else if (Math.random() < 0.005) {
      this.bubbleTimer = 110;
      if (environment.hcl > 40) {
        this.bubbleText = "콜록..! HCl 가스 매워!!😭";
      } else {
        const phrases = ["열심히 조립 중!", "화학공학 재밌당", "산소 미포함 컨셉!", "캐릭터 등장!", "MOF 최고야"];
        this.bubbleText = phrases[Math.floor(Math.random() * phrases.length)];
      }
    }
  }
  
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);

    // 알약 모양의 귀여운 방호복 몸통 그리기
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(0, -10, 10, Math.PI, 0, false); // 머리 돔 (크기를 살짝 키움)
    ctx.lineTo(10, 12);
    ctx.arc(0, 12, 10, 0, Math.PI, false); // 하단 엉덩이
    ctx.lineTo(-10, -10);
    ctx.closePath();
    ctx.fill();

    // 헬멧 유리창 고글 표현
    ctx.fillStyle = '#e2e8f0';
    ctx.fillRect(-6, -12, 12, 7);
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(this.vx > 0 ? 3 : -5, -10, 2, 2); // 이동 방향에 따른 눈동자 시선 처리

    // 뽈뽈거리는 다리 애니메이션
    let walk = Math.sin(Date.now() * 0.015) * 4;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-6, 20, 4, 5 + walk);
    ctx.fillRect(2, 20, 4, 5 - walk);

    // 연구원 이름표
    ctx.fillStyle = '#cbd5e1';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(this.name, 0, -26);

    ctx.restore();

    // 말풍선 드로잉
    if (this.bubbleTimer > 0) {
      ctx.fillStyle = "white";
      ctx.fillRect(this.x - 45, this.y - 56, 90, 18);
      ctx.strokeStyle = "#475569";
      ctx.strokeRect(this.x - 45, this.y - 56, 90, 18);
      ctx.fillStyle = "#000";
      ctx.font = "bold 9px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(this.bubbleText, this.x, this.y - 44);
    }
  }
}

// ═══════════════════════════════════════════
//  초기화 세팅
// ═══════════════════════════════════════════
function init() {
  canvas = document.getElementById('game-canvas');
  ctx = canvas.getContext('2d');
  
  const container = document.getElementById('viewport-container');
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  
  // 👷 화면 중앙 좌표를 기준으로 캐릭터 스폰 위치 강제 지정!
  let centerX = canvas.width / 2;
  let centerY = canvas.height / 2;

  const colors = ['#f472b6', '#60a5fa', '#fbbf24', '#34d399'];
  const names = ['듀플-화공', '듀플-소재', '듀플-지멘스', '야기-봇'];
  
  minions = []; // 초기화
  for(let i=0; i<4; i++){
    // 중앙 지점을 기준으로 사방 80픽셀 이내에 확실하게 배치
    let startX = centerX + (Math.random() * 160 - 80);
    let startY = centerY + (Math.random() * 160 - 80);
    minions.push(new Minion(startX, startY, names[i], colors[i]));
  }
  
  // 기본 중앙 허브 포드 배치
  buildings.push({ c: Math.floor(colsCount() / 2), r: Math.floor(rowsCount() / 2), type: 'pod' });
}

function colsCount() { return Math.ceil(canvas.width / TILE_SIZE); }
function rowsCount() { return Math.ceil(canvas.height / TILE_SIZE); }

// ═══════════════════════════════════════════
//  틱 루프 (화학 반응 및 연산)
// ═══════════════════════════════════════════
function gameTick() {
  res.sicl += 1.5;
  res.mat += 0.4;
  
  let deltaCo2 = 0;
  let deltaHcl = 0;
  
  buildings.forEach(b => {
    if (b.type === 'factory') {
      if (res.sicl >= 2 && res.h2 >= 1) {
        res.sicl -= 2;
        res.h2 -= 1;
        res.silicon += 1; 
        deltaCo2 += 1.4;  
        deltaHcl += 1.7;
      }
    }
    else if (b.type === 'mof') {
      if (environment.hcl > 1) {
        environment.hcl -= 2.2; 
        res.h2 += 1.0;          
      }
    }
  });
  
  environment.co2 = Math.max(0, Math.min(100, environment.co2 + deltaCo2 - 0.4));
  environment.hcl = Math.max(0, Math.min(100, environment.hcl + deltaHcl - 0.2));
  
  document.getElementById('r-sicl').textContent = Math.floor(res.sicl);
  document.getElementById('r-h2').textContent = Math.floor(res.h2);
  document.getElementById('r-mat').textContent = Math.floor(res.mat);
  document.getElementById('hud-si').textContent = res.silicon + "개";
  
  document.getElementById('h-co2').textContent = Math.floor(environment.co2) + "%";
  document.getElementById('h-hcl').textContent = Math.floor(environment.hcl) + "%";
}

// ═══════════════════════════════════════════
//  그래픽 렌더링 (60FPS)
// ═══════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // 1. 대기 오염도 가스 시각화
  if (environment.co2 > 2 || environment.hcl > 2) {
    let alpha = Math.min(0.45, (environment.co2 + environment.hcl) * 0.005);
    ctx.fillStyle = `rgba(100, 222, 100, ${alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  
  // 2. 바닥 기본 그리드 타일선 그리기
  ctx.strokeStyle = '#1e2235';
  ctx.lineWidth = 1;
  const cols = colsCount();
  const rows = rowsCount();
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      ctx.strokeRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
    }
  }
  
  // 3. 설비 기계 장치 드로잉
  buildings.forEach(b => {
    let px = b.c * TILE_SIZE;
    let py = b.r * TILE_SIZE;
    
    if (b.type === 'pod') {
      ctx.fillStyle = '#0284c7'; ctx.fillRect(px+3, py+3, TILE_SIZE-6, TILE_SIZE-6);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif'; ctx.fillText("🛰️제어 포드", px+5, py+32);
    } 
    else if (b.type === 'factory') {
      ctx.fillStyle = '#475569'; ctx.fillRect(px+4, py+4, TILE_SIZE-8, TILE_SIZE-8);
      ctx.fillStyle = '#38bdf8'; ctx.font = 'bold 9px sans-serif'; ctx.fillText("🏭정련소", px+7, py+32);
    }
    else if (b.type === 'mof') {
      ctx.fillStyle = '#ca8a04'; ctx.fillRect(px+5, py+5, TILE_SIZE-10, TILE_SIZE-10);
      ctx.strokeStyle = '#f59e0b'; ctx.strokeRect(px+10, py+10, TILE_SIZE-20, TILE_SIZE-20);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif'; ctx.fillText("🧽MOF필터", px+5, py+32);
    }
  });
  
  // 4. 귀여운 연구원 캐릭터 업뎃 및 그리기
  minions.forEach(m => {
    m.update();
    m.draw();
  });
  
  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════
//  컨트롤 인터랙션
// ═══════════════════════════════════════════
document.getElementById('build-menu').addEventListener('click', e => {
  let btn = e.target.closest('.build-btn');
  if (!btn) return;
  document.querySelectorAll('.build-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMode = btn.dataset.mode;
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  const c = Math.floor(x / TILE_SIZE);
  const r = Math.floor(y / TILE_SIZE);
  
  if (currentMode === 'inspect') return;
  
  if (buildings.some(b => b.c === c && b.r === r)) return;
  
  if (currentMode === 'build_factory' && res.sicl >= 20) {
    res.sicl -= 20;
    buildings.push({ c: c, r: r, type: 'factory' });
  } 
  else if (currentMode === 'build_mof' && res.mat >= 15) {
    res.mat -= 15;
    buildings.push({ c: c, r: r, type: 'mof' });
  }
});

// 창 크기가 바뀔 때 캐릭터가 튕겨 나가지 않도록 조정
window.addEventListener('resize', () => {
  if (canvas) {
    const container = document.getElementById('viewport-container');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
  }
});

// 엔진 가동 시작
init();
render();
setInterval(gameTick, 1000);
</script>
</body>
</html>
