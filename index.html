<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문명 재건 — 원소에서 반도체까지</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; }

/* ── LAYOUT ── */
#ui-root { display: grid; grid-template-columns: 200px 1fr 240px; grid-template-rows: 44px 1fr 160px; width: 100vw; height: 100vh; }

/* ── TOP BAR ── */
#topbar {
  grid-column: 1 / 4; grid-row: 1;
  background: #111; border-bottom: 1px solid #2a2a2a;
  display: flex; align-items: center; gap: 20px; padding: 0 16px;
}
.game-title { font-size: 14px; font-weight: 600; color: #c8e6a0; letter-spacing: 0.5px; }
.res-group { display: flex; gap: 14px; flex: 1; }
.res-chip { font-size: 12px; color: #999; display: flex; align-items: center; gap: 4px; }
.res-chip span { font-weight: 600; font-size: 13px; }
.res-chip.stone span { color: #b0a090; }
.res-chip.wood  span { color: #7db86a; }
.res-chip.fuel  span { color: #e08030; }
.res-chip.ore   span { color: #90aacc; }
.res-chip.power span { color: #aaddff; }
.day-label { font-size: 11px; color: #555; margin-left: auto; }
#era-badge { font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 600; }

/* ── LEFT PANEL ── */
#left-panel {
  grid-column: 1; grid-row: 2 / 4;
  background: #141414; border-right: 1px solid #222;
  display: flex; flex-direction: column; overflow: hidden;
}
.panel-section { padding: 10px 12px; border-bottom: 1px solid #1e1e1e; }
.panel-title { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }

.pop-display { text-align: center; padding: 8px 0; }
.pop-num { font-size: 32px; font-weight: 700; color: #c8e6a0; line-height: 1; }
.pop-sub { font-size: 10px; color: #555; margin-top: 2px; }

.stat-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.stat-label { font-size: 11px; color: #666; width: 36px; flex-shrink: 0; }
.stat-bar { flex: 1; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.stat-val { font-size: 11px; color: #888; width: 24px; text-align: right; }

/* units list */
#unit-list { flex: 1; overflow-y: auto; padding: 8px; }
#unit-list::-webkit-scrollbar { width: 3px; }
#unit-list::-webkit-scrollbar-thumb { background: #333; }
.unit-item { display: flex; align-items: center; gap: 7px; padding: 5px 6px; border-radius: 5px; cursor: pointer; transition: background 0.1s; margin-bottom: 2px; }
.unit-item:hover { background: #1e1e1e; }
.unit-item.selected { background: #1f2d1a; }
.unit-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.unit-name { font-size: 12px; color: #ccc; flex: 1; }
.unit-state { font-size: 10px; color: #555; }
.unit-hp-bar { width: 40px; height: 3px; background: #222; border-radius: 1px; overflow: hidden; }
.unit-hp-fill { height: 100%; background: #5a9e4a; border-radius: 1px; }

#tick-btn {
  margin: 8px; padding: 8px; border-radius: 6px;
  background: #1f2d1a; border: 1px solid #3a5a2a;
  color: #8cc870; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
}
#tick-btn:hover { background: #253520; }

/* ── MAP ── */
#map-wrap {
  grid-column: 2; grid-row: 2;
  position: relative; overflow: hidden; cursor: crosshair;
}
#map-canvas { display: block; width: 100%; height: 100%; }

/* ── RIGHT PANEL ── */
#right-panel {
  grid-column: 3; grid-row: 2 / 4;
  background: #141414; border-left: 1px solid #222;
  display: flex; flex-direction: column; overflow: hidden;
}
.right-tabs { display: flex; border-bottom: 1px solid #222; }
.rtab { flex: 1; padding: 8px 4px; font-size: 11px; text-align: center; cursor: pointer; color: #555; border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.15s; }
.rtab.active { color: #c8e6a0; border-bottom-color: #6a9e50; }
.rtab-content { display: none; flex: 1; overflow-y: auto; padding: 10px; }
.rtab-content::-webkit-scrollbar { width: 3px; }
.rtab-content::-webkit-scrollbar-thumb { background: #333; }
.rtab-content.active { display: block; }

/* tech cards */
.tech-era { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin: 10px 0 6px; }
.tech-card {
  background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
  padding: 8px 10px; margin-bottom: 5px; cursor: pointer; transition: all 0.15s;
}
.tech-card:hover:not(.locked):not(.done) { border-color: #3a5a2a; background: #1e2a1a; }
.tech-card.done { border-color: #3a5a2a; background: #141e10; opacity: 0.75; }
.tech-card.locked { opacity: 0.35; cursor: not-allowed; }
.tech-card.active-research { border-color: #2a4a7a; background: #0f1822; }
.tc-head { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.tc-name { font-size: 12px; font-weight: 600; color: #ccc; flex: 1; }
.tc-check { font-size: 11px; color: #6a9e50; }
.tc-formula { font-size: 10px; color: #4a7aaa; font-family: monospace; margin-bottom: 3px; }
.tc-cost { display: flex; gap: 4px; flex-wrap: wrap; }
.cost-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: #222; color: #888; }
.cost-tag.no { color: #cc6655; background: #2a1510; }
.prog-bar { height: 2px; background: #1e3050; border-radius: 1px; margin-top: 5px; overflow: hidden; }
.prog-fill { height: 100%; background: #4a8acc; border-radius: 1px; transition: width 0.3s; }

/* detail panel */
#detail-box { padding: 10px; font-size: 12px; border-top: 1px solid #1e1e1e; }
#detail-box.hidden { display: none; }
.db-title { font-size: 13px; font-weight: 600; color: #c8e6a0; margin-bottom: 4px; }
.db-formula { font-family: monospace; font-size: 11px; color: #5a9acc; background: #0f1822; padding: 4px 8px; border-radius: 4px; margin-bottom: 6px; }
.db-desc { color: #888; line-height: 1.6; margin-bottom: 8px; font-size: 11px; }
.db-effects { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
.db-effect { font-size: 11px; color: #6a9e50; }
.db-btn {
  width: 100%; padding: 7px; border-radius: 5px; border: 1px solid #3a5a2a;
  background: #1a2e18; color: #8cc870; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.db-btn:hover:not(:disabled) { background: #22361e; }
.db-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── BOTTOM LOG ── */
#bottom-log {
  grid-column: 2; grid-row: 3;
  background: #0f0f0f; border-top: 1px solid #1e1e1e;
  padding: 8px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px;
}
#bottom-log::-webkit-scrollbar { width: 3px; }
#bottom-log::-webkit-scrollbar-thumb { background: #333; }
.log-line { font-size: 11px; color: #555; line-height: 1.4; }
.log-line.success { color: #6a9e50; }
.log-line.warn { color: #cc8833; }
.log-line.info { color: #4a8acc; }
.log-line.event { color: #aa80cc; }

/* ── TOOLTIP ── */
#tooltip {
  position: absolute; background: #111; border: 1px solid #333;
  border-radius: 6px; padding: 7px 10px; font-size: 11px; color: #ccc;
  pointer-events: none; display: none; z-index: 100; max-width: 160px; line-height: 1.5;
}
</style>
</head>
<body>
<div id="ui-root">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="game-title">⚗ 문명 재건</div>
    <span id="era-badge" style="background:#1a2e18;color:#6a9e50;">석기 시대</span>

  <!-- LEFT PANEL -->
  <div id="left-panel">

  </div>

<script>
// ═══════════════════════════════════════════
//  WORLD GENERATION
// ═══════════════════════════════════════════
const WORLD_W = 160, WORLD_H = 110;
let heightMap = [], moistureMap = [], resourceMap = [];

function noise(x, y, seed) {
  const s = Math.sin(x * 127.1 + y * 311.7 + seed) * 43758.5453;
  return s - Math.floor(s);
}

function smoothNoise(x, y, seed, scale) {
  const xi = x / scale, yi = y / scale;
  const x0 = Math.floor(xi), y0 = Math.floor(yi);
  const fx = xi - x0, fy = yi - y0;
  const n00 = noise(x0, y0, seed), n10 = noise(x0+1, y0, seed);
  const n01 = noise(x0, y0+1, seed), n11 = noise(x0+1, y0+1, seed);
  const sx = fx*fx*(3-2*fx), sy = fy*fy*(3-2*fy);
  return n00 + (n10-n00)*sx + (n01-n00)*sy + (n00-n10-n01+n11)*sx*sy;
}

function fbm(x, y, seed, octaves, scale) {
  let v=0, amp=1, tot=0, sc=scale;
  for (let i=0; i<octaves; i++) { v += smoothNoise(x,y,seed+i*100,sc)*amp; tot+=amp; amp*=0.5; sc*=0.5; }
  return v/tot;
}

function generateWorld() {
  const cx = WORLD_W/2, cy = WORLD_H/2;
  const seed1 = Math.random()*999, seed2 = Math.random()*999+500;
  for (let y=0; y<WORLD_H; y++) {
    heightMap[y]=[]; moistureMap[y]=[]; resourceMap[y]=[];
    for (let x=0; x<WORLD_W; x++) {
      const h = fbm(x,y,seed1,6,40);
      const dist = Math.sqrt((x-cx)**2+(y-cy)**2) / (Math.min(cx,cy)*0.9);
      heightMap[y][x] = Math.max(0, h - dist*0.35);
      moistureMap[y][x] = fbm(x,y,seed2,4,30);
      resourceMap[y][x] = null;
    }
  }
  // scatter resources
  const types = ['stone','wood','ore','fuel'];
  const counts = {stone:40,wood:50,ore:18,fuel:12};
  types.forEach(t => {
    let placed=0;
    while(placed < counts[t]) {
      const rx = Math.floor(Math.random()*WORLD_W);
      const ry = Math.floor(Math.random()*WORLD_H);
      const h = heightMap[ry][rx];
      const m = moistureMap[ry][rx];
      let ok = false;
      if (t==='stone' && h>0.35 && h<0.75) ok=true;
      if (t==='wood'  && h>0.32 && h<0.62 && m>0.4) ok=true;
      if (t==='ore'   && h>0.5) ok=true;
      if (t==='fuel'  && h>0.28 && h<0.50 && m>0.5) ok=true;
      if (ok && !resourceMap[ry][rx]) { resourceMap[ry][rx]={type:t, amount:Math.floor(Math.random()*30+15)}; placed++; }
    }
  });
}

function getBiome(h, m) {
  if (h < 0.28) return 'water';
  if (h < 0.32) return 'shore';
  if (h > 0.78) return 'mountain';
  if (h > 0.65) return 'highland';
  if (m > 0.62) return 'forest';
  if (m > 0.42) return 'grassland';
  return 'plains';
}

const BIOME_COLOR = {
  water:     '#1a3a5c',
  shore:     '#c8b87a',
  plains:    '#8aaa60',
  grassland: '#5a8840',
  forest:    '#2d5a28',
  highland:  '#7a7060',
  mountain:  '#9a9898',
};

const RES_COLOR = { stone:'#c0b0a0', wood:'#a06030', ore:'#6090c0', fuel:'#c07830' };

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
let state = {
  day: 1,
  res: { stone:120, wood:80, fuel:40, ore:0, power:0 },
  stats: { survival:70, food:55, knowledge:10, industry:5 },
  population: 8,
  unlocked: new Set(),
  researching: null, researchProg: 0, researchTarget: 3,
  era: 1,
  chemLog: [],
  selectedUnit: null,
  selectedTech: null,
};

// units
let units = [];
function spawnUnits() {
  const names = ['알파','베타','감마','델타','엡실론','제타','에타','세타'];
  const colors = ['#e06060','#60a0e0','#e0c060','#80cc70','#cc80d0','#e09050','#60ccd0','#d06080'];
  const cx = WORLD_W/2, cy = WORLD_H/2;
  for (let i=0; i<8; i++) {
    units.push({
      id:i, name:names[i], color:colors[i],
      wx: cx + (Math.random()-0.5)*10,
      wy: cy + (Math.random()-0.5)*10,
      tx: null, ty: null,
      state: 'idle', hp: 80+Math.floor(Math.random()*20), maxHp:100,
      carrying: null, carryAmt: 0,
      job: 'explorer', xp: 0, level: 1,
    });
  }
}

// ═══════════════════════════════════════════
//  TECH TREE
// ═══════════════════════════════════════════
const TECHS = [
  {id:'fire',  era:1, name:'불 피우기',      formula:'C + O₂ → CO₂ + 열',
   desc:'마찰열로 발화점을 초과시켜 산화 연쇄 반응을 시작합니다. 인류 최초의 화학 반응 활용.',
   effects:['+연료 채취 효율 2배','+야간 생존율'], costs:{stone:20,wood:30}, req:[], stat:{knowledge:5,industry:2}},
  {id:'clay',  era:1, name:'토기 제작',      formula:'SiO₂·Al₂O₃ → 소성 도자기 800°C',
   desc:'점토(규산알루미늄)를 800°C 이상으로 소성하면 경질 세라믹이 됩니다.',
   effects:['+식량 보관','+물 저장'], costs:{stone:10,wood:20}, req:['fire'], stat:{food:10,knowledge:3}},
  {id:'charcoal',era:1,name:'숯 제조',       formula:'C₆H₁₂O₆ → 6C + H₂O + CO₂',
   desc:'산소 차단 상태에서 목재를 가열하면 셀룰로스가 열분해되어 순수 탄소 덩어리인 숯이 됩니다.',
   effects:['+연료 효율 2배','야금 해금'], costs:{wood:50}, req:['fire'], stat:{fuel:15,industry:5}},

  {id:'copper',era:2, name:'구리 제련',      formula:'Cu₂O + C → 2Cu + CO₂ (산화환원)',
   desc:'산화구리와 숯의 산화환원 반응. 탄소가 산소를 빼앗아 순수 구리가 석출됩니다.',
   effects:['+도구 효율','+광물 채취 속도'], costs:{ore:20,fuel:30}, req:['charcoal'], stat:{industry:10,knowledge:8}},
  {id:'iron',  era:2, name:'철 제련',        formula:'Fe₂O₃ + 3CO → 2Fe + 3CO₂',
   desc:'철광석(Fe₂O₃)과 일산화탄소(CO)의 산화환원. 고로에서 코크스가 CO를 만들고 철을 환원합니다.',
   effects:['+건설력 대폭','+농기구'], costs:{ore:50,fuel:60}, req:['copper'], stat:{industry:20,knowledge:10}},
  {id:'ceramic',era:2,name:'고급 세라믹',    formula:'3Al₂O₃·2SiO₂ → 뮬라이트 1200°C',

   effects:['+내화 용기','화학 실험 가능'], costs:{stone:60,fuel:40}, req:['clay','fire'], stat:{knowledge:15,industry:8}},

   desc:'모래+탄산나트륨+석회를 1500°C 용융 후 냉각. SiO₄ 사면체가 비정질 망상구조를 형성합니다.',

// ═══════════════════════════════════════════
//  CANVAS RENDERER
// ═══════════════════════════════════════════
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
let TW = 1, TH = 1;
let camX = 0, camY = 0, zoom = 6;
let isDragging = false, dragStart = {x:0,y:0}, camStart = {x:0,y:0};
let mapImageData = null;

function resizeCanvas() {
  const wrap = document.getElementById('map-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  TW = canvas.width / (WORLD_W * zoom);
  TH = canvas.height / (WORLD_H * zoom);
  renderMap();
}

function worldToScreen(wx, wy) {
  return { x: (wx - camX) * zoom, y: (wy - camY) * zoom };
}

function screenToWorld(sx, sy) {
  return { x: sx / zoom + camX, y: sy / zoom + camY };
}

function bakeMapImage() {
  const offscreen = document.createElement('canvas');
  offscreen.width = WORLD_W * zoom;
  offscreen.height = WORLD_H * zoom;
  const oc = offscreen.getContext('2d');

  for (let y=0; y<WORLD_H; y++) {
    for (let x=0; x<WORLD_W; x++) {
      const h = heightMap[y][x], m = moistureMap[y][x];
      const biome = getBiome(h, m);
      let col = BIOME_COLOR[biome];
      // shade by height
      const shade = 0.8 + h * 0.4;
      oc.fillStyle = shadeHex(col, shade);
      oc.fillRect(x*zoom, y*zoom, zoom, zoom);
    }
  }
  mapImageData = offscreen;
}

function shadeHex(hex, factor) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255,Math.round(r*factor));
  g = Math.min(255,Math.round(g*factor));
  b = Math.min(255,Math.round(b*factor));
  return `rgb(${r},${g},${b})`;
}

function renderMap() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  // draw baked terrain
  if (mapImageData) {
    ctx.drawImage(mapImageData, -camX*zoom, -camY*zoom);
  }

  // draw resources
  for (let y=0; y<WORLD_H; y++) {
    for (let x=0; x<WORLD_W; x++) {
      const r = resourceMap[y][x];
      if (!r || r.amount <= 0) continue;
      const s = worldToScreen(x+0.5, y+0.5);
      if (s.x<-zoom||s.x>W+zoom||s.y<-zoom||s.y>H+zoom) continue;
      const alpha = Math.min(1, r.amount/30);
      ctx.globalAlpha = 0.35 + alpha*0.5;
      ctx.fillStyle = RES_COLOR[r.type];
      const sz = 2.5 + alpha*2;
      ctx.beginPath(); ctx.arc(s.x,s.y,sz,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // draw base camp
  const baseS = worldToScreen(WORLD_W/2, WORLD_H/2);
  ctx.fillStyle = '#ffe080';
  ctx.strokeStyle = '#ffc020';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(baseS.x, baseS.y, 6, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#1a1a1a';
  ctx.font = 'bold 8px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('★', baseS.x, baseS.y+3);

  // draw unit paths
  units.forEach(u => {
    if (u.tx === null) return;
    const from = worldToScreen(u.wx, u.wy);
    const to   = worldToScreen(u.tx, u.ty);
    ctx.strokeStyle = u.color + '44';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(from.x,from.y); ctx.lineTo(to.x,to.y); ctx.stroke();
    ctx.setLineDash([]);
  });

  // draw units
  units.forEach(u => {
    const s = worldToScreen(u.wx, u.wy);
    if (s.x<-10||s.x>W+10||s.y<-10||s.y>H+10) return;
    const selected = state.selectedUnit === u.id;

    if (selected) {
      ctx.fillStyle = u.color + '33';
      ctx.beginPath(); ctx.arc(s.x,s.y,10,0,Math.PI*2); ctx.fill();
    }

    ctx.fillStyle = u.color;
    ctx.strokeStyle = selected ? '#fff' : '#1a1a1a';
    ctx.lineWidth = selected ? 1.5 : 1;
    ctx.beginPath(); ctx.arc(s.x,s.y,5,0,Math.PI*2); ctx.fill(); ctx.stroke();

    // hp pip
    const hpFrac = u.hp / u.maxHp;
    ctx.fillStyle = '#222';
    ctx.fillRect(s.x-5, s.y+7, 10, 2);
    ctx.fillStyle = hpFrac>0.5 ? '#5a9e4a' : hpFrac>0.25 ? '#cc8833' : '#cc4433';
    ctx.fillRect(s.x-5, s.y+7, 10*hpFrac, 2);
  });

  // selection range ring for selected unit
  const sel = units.find(u => u.id === state.selectedUnit);
  if (sel) {
    const s = worldToScreen(sel.wx, sel.wy);
    ctx.strokeStyle = '#ffffff22';
    ctx.lineWidth = 1;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(s.x,s.y,12*zoom/zoom,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ═══════════════════════════════════════════
//  UNIT AI & MOVEMENT
// ═══════════════════════════════════════════
function tickUnits() {
  units.forEach(u => {
    if (u.tx !== null) {
      const dx = u.tx - u.wx, dy = u.ty - u.wy;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const speed = 0.8;
      if (dist < speed) {
        u.wx = u.tx; u.wy = u.ty;
        arriveAt(u);
      } else {
        u.wx += dx/dist * speed;
        u.wy += dy/dist * speed;
      }
    } else {
      // idle: random wander near base
      if (Math.random() < 0.15) {
        const angle = Math.random() * Math.PI*2;
        const r = Math.random() * 15 + 3;
        u.tx = Math.max(1, Math.min(WORLD_W-1, WORLD_W/2 + Math.cos(angle)*r));
        u.ty = Math.max(1, Math.min(WORLD_H-1, WORLD_H/2 + Math.sin(angle)*r));
        u.state = 'exploring';
      }
    }
  });
}

function arriveAt(u) {
  const gx = Math.floor(u.wx), gy = Math.floor(u.wy);
  const res = resourceMap[gy] && resourceMap[gy][gx];
  if (res && res.amount > 0) {
    const harvest = Math.min(res.amount, Math.floor(Math.random()*5+3));
    const bonus = (res.type==='fuel' && state.unlocked.has('fire')) ? 2 : 1;
    const gain = harvest * bonus;
    state.res[res.type] = Math.min(9999, state.res[res.type] + gain);
    res.amount -= harvest;
    u.carrying = res.type; u.carryAmt = gain;
    u.state = 'returning';
    addLog(`${u.name}이(가) ${resLabel(res.type)} ${gain}개 채취.`, 'success');
  } else {
    u.carrying = null; u.state = 'idle';
  }
  u.tx = null; u.ty = null;

  // ore unlock
  if (!state.unlocked.has('iron') && resourceMap[gy] && resourceMap[gy][gx]) {
    if (resourceMap[gy][gx].type === 'ore' && state.res.ore > 10 && Math.random()<0.3) {
      addLog(`${u.name}: "땅 속에 검은 돌이 있다... 뭔가 쓸 수 있을 것 같다."`, 'event');
    }
  }

  // random events
  if (Math.random() < 0.05) {
    const events = [
      ()=> { const bonus=Math.floor(Math.random()*20+5); state.res.stone+=bonus; addLog(`${u.name}이(가) 돌무더기를 발견! +${bonus} 돌.`, 'event'); },
      ()=> { addLog(`${u.name}이(가) 오래된 유물 파편을 발견. 지식 +3.`, 'event'); state.stats.knowledge=Math.min(100,state.stats.knowledge+3); },
      ()=> { const dmg=Math.floor(Math.random()*10+5); u.hp=Math.max(1,u.hp-dmg); addLog(`${u.name}이(가) 야생 동물에 습격당했다! -${dmg} HP.`, 'warn'); },
    ];
    events[Math.floor(Math.random()*events.length)]();
  }
}

function resLabel(t) { return {stone:'돌',wood:'목재',fuel:'연료',ore:'광물',power:'전력'}[t]||t; }

// Manual move on map click
canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isDragging = false;
  dragStart = {x:e.clientX, y:e.clientY};
  camStart = {x:camX, y:camY};

  canvas.addEventListener('mousemove', onDrag);
  canvas.addEventListener('mouseup', onUp);
});

function onDrag(e) {
  const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
  if (Math.abs(dx)>4||Math.abs(dy)>4) isDragging = true;
  if (isDragging) {
    camX = camStart.x - dx/zoom;
    camY = camStart.y - dy/zoom;
    camX = Math.max(0, Math.min(WORLD_W - canvas.width/zoom, camX));
    camY = Math.max(0, Math.min(WORLD_H - canvas.height/zoom, camY));
  }
}

function onUp(e) {
  canvas.removeEventListener('mousemove', onDrag);
  canvas.removeEventListener('mouseup', onUp);
  if (!isDragging) handleMapClick(e);
}

function handleMapClick(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const w = screenToWorld(sx, sy);

  // check if clicking a unit
  let clickedUnit = null;
  units.forEach(u => {
    const us = worldToScreen(u.wx, u.wy);
    const d = Math.sqrt((us.x-sx)**2+(us.y-sy)**2);
    if (d < 8) clickedUnit = u;
  });

  if (clickedUnit) {
    state.selectedUnit = clickedUnit.id;
    updateUnitList();
    return;
  }

  // right-click or selected unit → send selected unit there
  if (state.selectedUnit !== null) {
    const u = units.find(u => u.id === state.selectedUnit);
    if (u) {
      u.tx = Math.max(0.5,Math.min(WORLD_W-0.5,w.x));
      u.ty = Math.max(0.5,Math.min(WORLD_H-0.5,w.y));
      u.state = 'moving';
    }
  }
}

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const wx = sx/zoom+camX, wy = sy/zoom+camY;
  zoom = Math.max(3, Math.min(16, zoom*factor));
  camX = wx - sx/zoom;
  camY = wy - sy/zoom;
}, {passive:false});

// tooltip
canvas.addEventListener('mousemove', e => {
  if (isDragging) { document.getElementById('tooltip').style.display='none'; return; }
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX-rect.left, sy = e.clientY-rect.top;
  const w = screenToWorld(sx,sy);
  const gx=Math.floor(w.x), gy=Math.floor(w.y);
  const tip = document.getElementById('tooltip');
  if (gx>=0&&gx<WORLD_W&&gy>=0&&gy<WORLD_H) {
    const h=heightMap[gy][gx], m=moistureMap[gy][gx];
    const biome=getBiome(h,m);
    const biomeLabel={water:'바다',shore:'해안',plains:'평원',grassland:'초원',forest:'숲',highland:'고지',mountain:'산지'};
    const r=resourceMap[gy][gx];
    const resInfo = r&&r.amount>0 ? `\n${resLabel(r.type)}: ${r.amount}` : '';
    tip.textContent = `${biomeLabel[biome]}${resInfo}`;
    tip.style.display='block';
    tip.style.left=(e.clientX-rect.left+12)+'px';
    tip.style.top=(e.clientY-rect.top+12)+'px';
  } else {
    tip.style.display='none';
  }
});
canvas.addEventListener('mouseleave', ()=>{ document.getElementById('tooltip').style.display='none'; });

function updateTopBar() {
  ['stone','wood','fuel','ore','power'].forEach(r => {
    document.getElementById('r-'+r).textContent = state.res[r];
  });
  document.getElementById('day-label').textContent = `Day ${state.day}`;
  document.getElementById('pop-num').textContent = state.population;
  ['survival','food','knowledge','industry'].forEach(k => {
    const v = Math.min(100,Math.round(state.stats[k]));
    document.getElementById('bar-'+k).style.width = v+'%';
    document.getElementById('val-'+k).textContent = v;
  });
  const eras = ['석기 시대','야금 시대','화학 시대','전기 시대','신소재 시대'];
  const eraCols = [['#1a2e18','#6a9e50'],['#2e2010','#aa7030'],['#101828','#4a8acc'],['#1a1030','#7060cc'],['#28100e','#cc6040']];
  document.getElementById('era-badge').textContent = eras[state.era-1];
  document.getElementById('era-badge').style.background = eraCols[state.era-1][0];
  document.getElementById('era-badge').style.color = eraCols[state.era-1][1];
}

function updateUnitList() {
  const el = document.getElementById('unit-list');
  el.innerHTML = '';
  units.forEach(u => {
    const div = document.createElement('div');
    div.className = 'unit-item' + (state.selectedUnit===u.id?' selected':'');
    const stateLabel = {idle:'대기',exploring:'탐험',moving:'이동',returning:'귀환'}[u.state]||u.state;
    div.innerHTML = `
      <div class="unit-dot" style="background:${u.color}"></div>
      <div>
        <div class="unit-name">${u.name} <span style="color:#555;font-size:10px;">Lv${u.level}</span></div>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:${u.hp/u.maxHp*100}%;background:${u.hp/u.maxHp>0.5?'#5a9e4a':u.hp/u.maxHp>0.25?'#cc8833':'#cc4433'}"></div></div>
      </div>
      <div class="unit-state">${stateLabel}${u.carrying?` (${resLabel(u.carrying)})`:''}</div>
    `;
    div.onclick = ()=>{
      state.selectedUnit = state.selectedUnit===u.id ? null : u.id;
      updateUnitList();
    };
    el.appendChild(div);
  });
}

// ── TECH TREE RENDER ──
function renderTechTree() {
  const el = document.getElementById('rtab-tech');
  const eraNames = ['','1기 — 석기 & 불','2기 — 야금 & 세라믹','3기 — 화학 & 유리','4기 — 전기화학','5기 — 고분자 & 신소재'];
  let html = '';
  for (let e=1;e<=5;e++) {
    html += `<div class="tech-era">${eraNames[e]}</div>`;
    TECHS.filter(t=>t.era===e).forEach(t=>{
      const done = state.unlocked.has(t.id);
      const researching = state.researching===t.id;
      const prereqMet = t.req.every(r=>state.unlocked.has(r));
      const eraLocked = t.era > state.era+1;
      const locked = (!prereqMet||eraLocked)&&!done;
      let cls='tech-card';
      if(done) cls+=' done';
      else if(researching) cls+=' active-research';
      else if(locked) cls+=' locked';
      const costs = Object.entries(t.costs).map(([r,v])=>{
        const has=state.res[r]||0;
        return `<span class="cost-tag${has<v&&!done?' no':''}">${resLabel(r)} ${v}</span>`;
      }).join('');
      const prog = researching ? `<div class="prog-bar"><div class="prog-fill" style="width:${Math.round(state.researchProg/state.researchTarget*100)}%"></div></div>` : '';
      html += `<div class="${cls}" onclick="selectTech('${t.id}')">
        <div class="tc-head"><span class="tc-name">${t.name}</span>${done?'<span class="tc-check">✓</span>':''}</div>
        <div class="tc-formula">${t.formula.split('→')[0].trim()} →</div>
        <div class="tc-cost">${costs}</div>${prog}
      </div>`;
    });
  }
  el.innerHTML = html;
}

function selectTech(id) {
  const tech = TECHS.find(t=>t.id===id);
  if (!tech) return;
  state.selectedTech = id;
  const done = state.unlocked.has(id);
  const researching = state.researching===id;
  const canAfford = Object.entries(tech.costs).every(([r,v])=>(state.res[r]||0)>=v);
  const prereqMet = tech.req.every(r=>state.unlocked.has(r));

  let btnHtml;
  if (done) btnHtml = `<button class="db-btn" disabled>✓ 연구 완료</button>`;
  else if (researching) btnHtml = `<button class="db-btn" disabled>연구 중... ${Math.round(state.researchProg/state.researchTarget*100)}%</button>`;
  else if (!prereqMet) btnHtml = `<button class="db-btn" disabled>선행 기술 필요</button>`;
  else if (!canAfford) btnHtml = `<button class="db-btn" disabled>자원 부족</button>`;
  else btnHtml = `<button class="db-btn" onclick="startResearch('${id}')">연구 시작</button>`;

  document.getElementById('detail-box').className = '';
  document.getElementById('detail-box').innerHTML = `
    <div class="db-title">${tech.name}</div>
    <div class="db-formula">${tech.formula}</div>
    <div class="db-desc">${tech.desc}</div>
    <div class="db-effects">${tech.effects.map(e=>`<div class="db-effect">▸ ${e}</div>`).join('')}</div>
    ${btnHtml}
  `;
}

function startResearch(id) {
  const tech = TECHS.find(t=>t.id===id);
  if (!tech||state.researching) return;
  const canAfford = Object.entries(tech.costs).every(([r,v])=>(state.res[r]||0)>=v);
  if (!canAfford) return;
  Object.entries(tech.costs).forEach(([r,v])=>{ state.res[r]-=v; });
  state.researching=id; state.researchProg=0; state.researchTarget=3;
  addLog(`"${tech.name}" 연구 시작.`, 'info');
  updateTopBar(); renderTechTree();
}

function renderChemDict() {
  const el = document.getElementById('rtab-chem');
  if (state.chemLog.length===0) { el.innerHTML='<div style="color:#444;font-size:12px;padding:12px;text-align:center;">기술 연구 완료 시 자동 등록</div>'; return; }
  el.innerHTML = state.chemLog.map(t=>`
    <div style="border:1px solid #2a2a2a;border-radius:5px;padding:8px 10px;margin-bottom:6px;background:#111;">
      <div style="font-size:12px;font-weight:600;color:#c8e6a0;margin-bottom:3px;">${t.name}</div>
      <div style="font-size:10px;color:#4a8acc;font-family:monospace;margin-bottom:4px;">${t.formula}</div>
      <div style="font-size:11px;color:#666;line-height:1.5;">${t.desc.slice(0,90)}...</div>
    </div>
  `).join('');
}

// ── LOG ──
function addLog(msg, type) {
  const el = document.getElementById('bottom-log');
  const div = document.createElement('div');
  div.className = 'log-line '+(type||'');
  div.textContent = `Day ${state.day}: ${msg}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  if (el.children.length > 60) el.removeChild(el.firstChild);
}

// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
function nextDay() {
  state.day++;

  // passive resource gain
  state.res.wood  = Math.min(9999, state.res.wood  + 6);
  state.res.stone = Math.min(9999, state.res.stone + 4);
  if (state.unlocked.has('charcoal')) state.res.fuel  = Math.min(9999, state.res.fuel  + 10);
  if (state.unlocked.has('iron'))     state.res.ore   = Math.min(9999, state.res.ore   + 12);
  if (state.unlocked.has('battery'))  state.res.power = Math.min(9999, state.res.power + 8);

  // food & survival
  state.stats.food = Math.max(0, state.stats.food - 2 + (state.unlocked.has('clay')?4:0));
  if (state.stats.food < 20) { state.stats.survival = Math.max(0, state.stats.survival-2); addLog('식량 위기! 생존율 감소.','warn'); }
  else { state.stats.survival = Math.min(100, state.stats.survival+1); }

  // population growth
  if (state.day%5===0 && state.stats.food>50) {
    state.population = Math.min(50, state.population+1);
    addLog(`인구 증가! 현재 ${state.population}명.`,'success');
  }

  // research
  if (state.researching) {
    state.researchProg++;
    if (state.researchProg >= state.researchTarget) {
      const tech = TECHS.find(t=>t.id===state.researching);
      state.unlocked.add(state.researching);
      state.chemLog.push(tech);
      Object.entries(tech.stat||{}).forEach(([k,v])=>{ state.stats[k]=Math.min(100,(state.stats[k]||0)+v); });
      addLog(`✓ "${tech.name}" 연구 완료!`, 'success');
      const maxEra = Math.max(...[...state.unlocked].map(id=>TECHS.find(t=>t.id===id)?.era||1));
      state.era = maxEra;
      state.researching=null; state.researchProg=0;
      if (state.selectedTech) selectTech(state.selectedTech);
    }
  }

  // tick units
  for (let i=0;i<8;i++) tickUnits();

  updateTopBar();
  updateUnitList();
  renderTechTree();
  renderChemDict();
}

function switchRTab(tab, btn) {
  document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.rtab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('rtab-'+tab).classList.add('active');
}

// ═══════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════
function animLoop() {
  renderMap();
  requestAnimationFrame(animLoop);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
generateWorld();
spawnUnits();
resizeCanvas();
bakeMapImage();
window.addEventListener('resize', ()=>{ resizeCanvas(); bakeMapImage(); });

// center camera on base
camX = WORLD_W/2 - canvas.width/(zoom*2);
camY = WORLD_H/2 - canvas.height/(zoom*2);

updateTopBar();
updateUnitList();
renderTechTree();
renderChemDict();
animLoop();
</script>
